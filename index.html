<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrickPrize Draw</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffcc00, #ff3b3b);
    color: #111;
    text-align: center;
  }

  header {
    background: #ffcc00;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .container {
    padding: 30px;
  }

  .card {
    background: white;
    margin: 20px auto;
    padding: 20px;
    max-width: 500px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  .btn {
    background: #ff3b3b;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
    transition: 0.2s;
  }

  .btn:hover {
    background: #d90000;
    transform: scale(1.05);
  }

  input {
    padding: 10px;
    width: 90%;
    margin: 5px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  .countdown {
    font-size: 22px;
    font-weight: bold;
    margin: 10px 0;
  }

  footer {
    margin-top: 40px;
    padding: 15px;
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<header>
🧱 BrickPrize Draw Giveaway
</header>

<div class="container">

  <div class="card">
    <h2>Win Brick-Themed Mystery Sets!</h2>
    <p>Enter below for a chance to win weekly prizes.</p>

    <div class="countdown" id="timer">Loading timer...</div>

    <input type="text" placeholder="Your name">
    <input type="email" placeholder="Your email">

    <button class="btn" onclick="enter()">Enter Giveaway</button>

    <p id="msg"></p>
  </div>

</div>

<footer>
Not affiliated with LEGO®. All trademarks belong to their owners.
</footer>

<script>
function enter() {
  document.getElementById("msg").innerText =
    "Entry submitted! Good luck 🎉";
}

// Countdown timer (7 days example)
let end = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);

let x = setInterval(function() {
  let now = new Date().getTime();
  let distance = end - now;

  let days = Math.floor(distance / (1000 * 60 * 60 * 24));
  let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("timer").innerHTML =
    "Next draw in: " + days + "d " + hours + "h " + minutes + "m";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("timer").innerHTML = "Draw Live Now!";
  }
}, 1000);
</script>

</body>
</html>
